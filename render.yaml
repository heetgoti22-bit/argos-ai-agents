databases:
  - name: argos-db
    plan: free
    databaseName: argos
    user: argos

services:
  - type: web
    name: argos-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: argos-db
          property: connectionString
      - key: CORS_ORIGINS
        value: https://argos-frontend.onrender.com
      - key: CLAUDE_API_KEY
        value: ""
      - key: GITHUB_TOKEN
        value: ""
      - key: VAULT_MASTER_KEY
        value: ""

  - type: web
    name: argos-frontend
    runtime: static
    plan: free
    rootDir: frontend
    buildCommand: npm install && REACT_APP_API_URL=https://argos-api.onrender.com npm run build
    staticPublishPath: build
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
